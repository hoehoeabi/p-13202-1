<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml">
<div layout:fragment="content" class="container my-3" style="max-width: 400px;">
    <h2 class="border-bottom pb-2 text-center">로그인</h2>

    <!-- 로그인 실패 시 에러 메시지 처리 -->
    <div th:if="${param.error}" class="alert alert-danger">
        사용자 ID 또는 비밀번호를 확인해 주세요.
    </div>

    <form th:action="@{/user/login}" method="post" class="mt-4">
        <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">로그인</button>

        <div class="text-center mt-3 small">
            아직 계정이 없으신가요? <a th:href="@{/user/signup}">회원가입 하러가기</a>
        </div>
    </form>
</div>
</html>
