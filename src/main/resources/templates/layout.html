<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>P13202 Project</title>
    <!-- 부트스트랩을 여기서 한 번만 선언 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- 공통 상단 네비게이션바 -->
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">P13202 게시판</a>

        <form class="d-flex mx-auto"
              th:action="@{/article/list}"
              method="get"
              style="max-width: 400px; width: 100%;"
              th:if="${hideSearch == null}">
            <input class="form-control me-2" type="search" name="keyword"
                   th:value="${param.keyword}" placeholder="제목, 내용, 작성자 검색" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">찾기</button>
        </form>
        
        <div class="d-flex">
            <div sec:authorize="isAnonymous()">
                <a class="btn btn-outline-primary me-2" th:href="@{/user/login}">로그인</a>
                <a class="btn btn-primary" th:href="@{/user/signup}">회원가입</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                <span class="me-3"><strong th:text="${#authentication.name}"></strong>님</span>
                <form th:action="@{/user/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- 각 페이지의 내용이 들어갈 자리 -->
<main layout:fragment="content" class="container"></main>

</body>
</html>
